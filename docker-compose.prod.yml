name: ecommerce-prod

# Usage: docker compose -f docker-compose.prod.yml up -d
# Uses your real Atlas cluster and a managed Redis — no local DB containers.
# All secrets MUST be provided via a .env file or your hosting platform's secret store.

services:

  api:
    build:
      context: .
      target: production       # uses the lean production stage (no dev deps, no src/)
    command: node dist/server.js
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_CLUSTER: ${MONGODB_CLUSTER}
      MONGODB_APP_NAME: ${MONGODB_APP_NAME:-Cluster0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      REDIS_URL: ${REDIS_URL}
      UPLOAD_DIR: upload/images
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-5}
    volumes:
      - upload-data:/app/upload/images     # persistent image storage
      - log-data:/app/logs                 # persistent log files
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  upload-data:
  log-data: